############################################################
#   DojoSource v117 - Logging Configuration
#   This file configures Java's built-in logging framework.
#   Logs are written to BOTH console AND files.
############################################################

############################################################
#   Global properties
############################################################

# Use BOTH ConsoleHandler (screen) and FileHandler (file)
handlers= java.util.logging.FileHandler, java.util.logging.ConsoleHandler

# Default global logging level
.level= INFO

############################################################
# FileHandler - writes logs to files in logs/ directory
############################################################

# Pattern: logs/server_[number].log (rotates automatically)
java.util.logging.FileHandler.pattern = logs/server_%g.log

# Max 5MB per log file
java.util.logging.FileHandler.limit = 5242880

# Keep up to 10 rotated log files (server_0.log through server_9.log)
java.util.logging.FileHandler.count = 10

# Append to existing file (don't overwrite on restart)
java.util.logging.FileHandler.append = true

# Use readable text format (not XML)
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

# SimpleFormatter pattern: [date time] [level] [class] message
java.util.logging.SimpleFormatter.format = [%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] [%4$s] [%3$s] %5$s%6$s%n

############################################################
# ConsoleHandler - shows logs on screen (BAT window)
############################################################

# Show ALL levels on console
java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

############################################################
# Facility specific properties
# Control logging level per component
############################################################

# Server core - show warnings and errors
MapleServerHandler.level = WARNING

# Movement handlers - only errors (very spammy otherwise)
PlayerMoveHandler.level = WARNING
MoveLifeHandler.level = WARNING

# Packet opcodes - show all for debugging
RecvPacketOpcode.level = FINEST
SendPacketOpcode.level = FINEST

# Login - show warnings
login.LoginWorker.level = WARNING

# Database - show warnings  
database.level = WARNING

# Scripting - show info and above (useful for NPC/quest debugging)
scripting.level = INFO